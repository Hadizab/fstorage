<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F storage PRO · large capacity</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, sans-serif;
        }

        body {
            background: #e7e5e4;
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        .f-wrapper {
            max-width: 1400px;
            margin: 0 auto;
        }

        .f-header {
            background: #1e1e2f;
            color: #f5e9d8;
            padding: 1.8rem 2rem;
            border-radius: 2rem 2rem 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .f-header h1 {
            font-size: 2.8rem;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .f-header h1 i {
            color: #e9b87a;
        }

        .stats {
            background: #2d2a3b;
            padding: 0.8rem 1.8rem;
            border-radius: 40px;
            font-size: 1.1rem;
        }

        .upload-area {
            background: #fcf8f3;
            padding: 2rem;
            border-radius: 0 0 2.5rem 2.5rem;
            margin-bottom: 2rem;
        }

        .drop-zone {
            border: 3px dashed #948e9e;
            background: #f2ede7;
            border-radius: 2rem;
            padding: 2rem;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
        }

        .drop-zone:hover {
            background: #ece4db;
            border-color: #8f7a62;
        }

        .drop-zone i {
            font-size: 3.8rem;
            color: #4a3f34;
        }

        .drop-zone p {
            font-size: 1.4rem;
            margin: 0.5rem 0;
        }

        .drop-zone small {
            background: #dbd3cb;
            padding: 0.3rem 1.2rem;
            border-radius: 40px;
        }

        #fileInput {
            display: none;
        }

        .capacity-bar {
            background: #2d2a3b;
            height: 8px;
            border-radius: 4px;
            margin: 1rem 0;
            overflow: hidden;
        }

        .capacity-fill {
            height: 100%;
            background: #e9b87a;
            width: 0%;
            transition: width 0.3s;
        }

        .capacity-text {
            text-align: right;
            color: #5f5346;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }

        .album-title {
            display: flex;
            justify-content: space-between;
            margin: 2rem 0 1rem;
        }

        .album-title h2 i {
            color: #aa7d5a;
            margin-right: 12px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1.5rem;
        }

        .archive-card {
            background: #fefefe;
            border-radius: 1.8rem;
            overflow: hidden;
            box-shadow: 0 10px 18px -6px rgba(0,0,0,0.15);
            transition: 0.2s;
            border: 1px solid #d9cdc0;
        }

        .archive-card:hover {
            transform: scale(1.02);
        }

        .card-preview {
            height: 150px;
            background: #d6cdc2;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .preview-img, .preview-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .preview-video {
            background: #000;
        }

        .preview-txt {
            background: #f0e3d6;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
        }

        .file-badge {
            position: absolute;
            top: 8px;
            right: 8px;
            background: #2b241ecc;
            color: #f1dbc7;
            padding: 0.2rem 0.7rem;
            border-radius: 30px;
            font-size: 0.7rem;
            backdrop-filter: blur(3px);
        }

        .card-meta {
            padding: 0.9rem;
            background: #fdfaf7;
        }

        .file-name {
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .file-size {
            font-size: 0.75rem;
            color: #7b6b5c;
            margin: 4px 0;
        }

        .card-actions {
            display: flex;
            gap: 6px;
        }

        .btn-download, .btn-delete {
            flex: 1;
            border: none;
            background: #e6dbd1;
            padding: 0.5rem;
            border-radius: 2rem;
            cursor: pointer;
            transition: 0.15s;
        }

        .btn-download:hover {
            background: #bfafa0;
        }

        .btn-delete {
            background: #f5dad1;
            color: #863a2b;
        }

        .btn-delete:hover {
            background: #e2b9ab;
        }

        .empty-album {
            grid-column: 1 / -1;
            background: #f0eae4;
            border-radius: 4rem;
            padding: 4rem;
            text-align: center;
            color: #5d5146;
        }

        .warning {
            background: #ffecb3;
            color: #856404;
            padding: 1rem;
            border-radius: 1rem;
            margin: 1rem 0;
            display: none;
        }

        .footer-note {
            margin-top: 3rem;
            color: #686056;
            text-align: center;
        }
    </style>
</head>
<body>
<div class="f-wrapper">
    <div class="f-header">
        <h1><i class="fas fa-box-archive"></i> F storage PRO</h1>
        <div class="stats" id="statsDisplay">
            <i class="fas fa-database"></i> <span id="fileCount">0</span> items · <span id="totalSize">0</span> MB
        </div>
    </div>

    <div class="upload-area">
        <div class="capacity-text">
            <span id="usedCapacity">0 MB</span> / <span id="totalCapacity">500 MB</span> used
        </div>
        <div class="capacity-bar">
            <div class="capacity-fill" id="capacityFill" style="width: 0%"></div>
        </div>

        <div class="drop-zone" id="dropZone">
            <i class="fas fa-cloud-upload-alt"></i>
            <p>drag & drop files — or click to browse</p>
            <small>images, video, text, pdf, word, html … up to 500MB total</small>
            <input type="file" id="fileInput" multiple>
        </div>

        <div class="warning" id="sizeWarning">
            <i class="fas fa-exclamation-triangle"></i> Approaching storage limit! Consider removing old files.
        </div>
    </div>

    <div class="album-title">
        <h2><i class="fas fa-film"></i> archive album</h2>
        <button class="clear-btn" id="clearAllBtn"><i class="fas fa-trash-alt"></i> clear all</button>
    </div>

    <div class="grid" id="archiveGrid"></div>

    <div class="footer-note">
        <i class="fas fa-database"></i> Using IndexedDB · videos up to 100MB supported
    </div>
</div>

<script>
    (function() {
        const DB_NAME = 'FStorageDB';
        const STORE_NAME = 'files';
        const DB_VERSION = 1;
        const MAX_STORAGE_MB = 500; // 500MB limit for demo (browsers allow much more)

        let db = null;
        let totalUsedBytes = 0;

        // Open IndexedDB connection
        function openDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);

                request.onerror = () => reject(request.error);
                request.onsuccess = () => {
                    db = request.result;
                    resolve(db);
                };

                request.onupgradeneeded = (event) => {
                    const db = event.target.result;
                    if (!db.objectStoreNames.contains(STORE_NAME)) {
                        const store = db.createObjectStore(STORE_NAME, { keyPath: 'id' });
                        store.createIndex('name', 'name', { unique: false });
                        store.createIndex('type', 'type', { unique: false });
                        store.createIndex('size', 'size', { unique: false });
                    }
                };
            });
        }

        // Get all files from IndexedDB
        function getAllFiles() {
            return new Promise((resolve, reject) => {
                const transaction = db.transaction([STORE_NAME], 'readonly');
                const store = transaction.objectStore(STORE_NAME);
                const request = store.getAll();

                request.onsuccess = () => {
                    const files = request.result || [];
                    // Calculate total size
                    totalUsedBytes = files.reduce((sum, file) => sum + (file.size || 0), 0);
                    resolve(files);
                };
                request.onerror = () => reject(request.error);
            });
        }

        // Add files to IndexedDB
        async function addFiles(files) {
            const currentFiles = await getAllFiles();
            const currentTotal = totalUsedBytes;
            
            let newTotal = currentTotal;
            const filesToAdd = [];

            for (let file of files) {
                newTotal += file.size;
                filesToAdd.push(file);
            }

            // Check if we exceed limit
            if (newTotal > MAX_STORAGE_MB * 1024 * 1024) {
                alert(`Cannot add: would exceed ${MAX_STORAGE_MB}MB limit`);
                return false;
            }

            const transaction = db.transaction([STORE_NAME], 'readwrite');
            const store = transaction.objectStore(STORE_NAME);

            for (let file of filesToAdd) {
                store.add(file);
            }

            return new Promise((resolve) => {
                transaction.oncomplete = () => resolve(true);
                transaction.onerror = () => resolve(false);
            });
        }

        // Delete a file
        function deleteFile(id) {
            return new Promise((resolve) => {
                const transaction = db.transaction([STORE_NAME], 'readwrite');
                const store = transaction.objectStore(STORE_NAME);
                store.delete(id);
                transaction.oncomplete = () => resolve(true);
            });
        }

        // Clear all files
        function clearAll() {
            return new Promise((resolve) => {
                const transaction = db.transaction([STORE_NAME], 'readwrite');
                const store = transaction.objectStore(STORE_NAME);
                store.clear();
                transaction.oncomplete = () => resolve(true);
            });
        }

        // Read file as ArrayBuffer (for IndexedDB storage)
        function readFileAsArrayBuffer(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.onerror = reject;
                reader.readAsArrayBuffer(file);
            });
        }

        // Convert ArrayBuffer to Blob URL for display
        function arrayBufferToURL(buffer, type) {
            const blob = new Blob([buffer], { type });
            return URL.createObjectURL(blob);
        }

        // Render the grid
        async function renderGrid() {
            const files = await getAllFiles();
            const grid = document.getElementById('archiveGrid');
            
            // Update stats
            document.getElementById('fileCount').textContent = files.length;
            const usedMB = (totalUsedBytes / (1024 * 1024)).toFixed(2);
            document.getElementById('totalSize').textContent = usedMB;
            document.getElementById('usedCapacity').textContent = usedMB + ' MB';
            document.getElementById('totalCapacity').textContent = MAX_STORAGE_MB + ' MB';
            
            const percentUsed = (totalUsedBytes / (MAX_STORAGE_MB * 1024 * 1024)) * 100;
            document.getElementById('capacityFill').style.width = Math.min(percentUsed, 100) + '%';
            
            // Show warning at 80%
            const warning = document.getElementById('sizeWarning');
            warning.style.display = percentUsed > 80 ? 'block' : 'none';

            if (files.length === 0) {
                grid.innerHTML = `<div class="empty-album">
                    <i class="fas fa-photo-video"></i><br>
                    your F storage album is empty
                </div>`;
                return;
            }

            let html = '';
            for (let file of files) {
                const fileSize = (file.size / 1024).toFixed(1) + ' KB';
                let previewHtml = '';

                // Create preview
                if (file.type.startsWith('image/')) {
                    const url = arrayBufferToURL(file.data, file.type);
                    previewHtml = `<img class="preview-img" src="${url}" alt="preview">`;
                } else if (file.type.startsWith('video/')) {
                    const url = arrayBufferToURL(file.data, file.type);
                    previewHtml = `<video class="preview-video" src="${url}" muted></video>`;
                } else {
                    previewHtml = `<div class="preview-txt"><i class="fas fa-file-alt"></i></div>`;
                }

                html += `
                    <div class="archive-card" data-id="${file.id}">
                        <div class="card-preview">
                            ${previewHtml}
                            <span class="file-badge">${file.type.split('/')[0]}</span>
                        </div>
                        <div class="card-meta">
                            <div class="file-name" title="${file.name}">${file.name}</div>
                            <div class="file-size">${fileSize}</div>
                            <div class="card-actions">
                                <button class="btn-download" data-id="${file.id}"><i class="fas fa-download"></i> get</button>
                                <button class="btn-delete" data-id="${file.id}"><i class="fas fa-times"></i> del</button>
                            </div>
                        </div>
                    </div>
                `;
            }

            grid.innerHTML = html;

            // Add event listeners
            document.querySelectorAll('.btn-download').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    e.stopPropagation();
                    const id = btn.dataset.id;
                    const files = await getAllFiles();
                    const file = files.find(f => f.id === id);
                    if (file) {
                        const blob = new Blob([file.data], { type: file.type });
                        const url = URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.href = url;
                        a.download = file.name;
                        a.click();
                        URL.revokeObjectURL(url);
                    }
                });
            });

            document.querySelectorAll('.btn-delete').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    e.stopPropagation();
                    const id = btn.dataset.id;
                    await deleteFile(id);
                    renderGrid();
                });
            });
        }

        // Initialize
        async function init() {
            await openDB();
            
            // Handle file upload
            const dropZone = document.getElementById('dropZone');
            const fileInput = document.getElementById('fileInput');
            const clearBtn = document.getElementById('clearAllBtn');

            dropZone.addEventListener('click', () => fileInput.click());

            ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
                dropZone.addEventListener(eventName, (e) => e.preventDefault());
            });

            dropZone.addEventListener('drop', async (e) => {
                e.preventDefault();
                const items = e.dataTransfer.files;
                await handleFiles(items);
            });

            fileInput.addEventListener('change', async (e) => {
                await handleFiles(fileInput.files);
                fileInput.value = '';
            });

            clearBtn.addEventListener('click', async () => {
                if (confirm('Delete all files?')) {
                    await clearAll();
                    renderGrid();
                }
            });

            async function handleFiles(fileList) {
                const files = [];
                
                for (let i = 0; i < fileList.length; i++) {
                    const file = fileList[i];
                    if (file.size > 100 * 1024 * 1024) { // 100MB per file limit
                        alert(`File "${file.name}" exceeds 100MB limit`);
                        continue;
                    }
                    
                    const arrayBuffer = await readFileAsArrayBuffer(file);
                    files.push({
                        id: Date.now() + '-' + i + '-' + file.name,
                        name: file.name,
                        type: file.type,
                        size: file.size,
                        data: arrayBuffer,
                        lastModified: file.lastModified
                    });
                }

                if (files.length > 0) {
                    const success = await addFiles(files);
                    if (success) {
                        renderGrid();
                    }
                }
            }

            // Initial render
            renderGrid();
        }

        init();
    })();
</script>
</body>
</html>
